---
- name: Create EC2 Instances using Ansible Loops
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    region: ap-south-1
    key_name: jbclarkkeys
    instance_type: t3.micro
    instances:
      - { image: "ami-0685bcc683dadb6b9", name: "manage-node-1", os: "amazon" }
      - { image: "ami-07a00cf47dbbc844c", name: "manage-node-2", os: "ubuntu" }
      - { image: "ami-07a00cf47dbbc844c", name: "manage-node-3", os: "ubuntu" }

  tasks:
    - name: Launch EC2 instances using loop
      amazon.aws.ec2_instance:
        name: "{{ item.name }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        security_group: default
        region: "{{ region }}"
        aws_access_key: "{{ ec2_access_key }}"
        aws_secret_key: "{{ ec2_secret_key }}"
        network:
          assign_public_ip: true
        image_id: "{{ item.image }}"
        state: running
        wait: true
        tags:
          Name: "{{ item.name }}"
          OS: "{{ item.os }}"
          Environment: production
      loop: "{{ instances }}"
      register: ec2_output

    - name: Print instance public IPs
      debug:
        msg: "{{ item.item.name }} - Instance ID: {{ item.instance_ids[0] }}"
      loop: "{{ ec2_output.results }}"
